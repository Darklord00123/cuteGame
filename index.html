<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveTrail — A Game for Two Hearts</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="landing-body">

  <div class="petals-bg" id="petalsBg"></div>

  <main class="landing-wrap">
    <div class="landing-card">

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 80 72" fill="none" xmlns="http://www.w3.org/2000/svg" width="80" height="72">
            <defs>
              <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#FF4D6D"/>
                <stop offset="100%" stop-color="#A084CA"/>
              </linearGradient>
            </defs>
            <path d="M40 68 C40 68 6 44 6 22 C6 12 14 4 24 4 C31 4 37 8 40 14 C43 8 49 4 56 4 C66 4 74 12 74 22 C74 44 40 68 40 68Z" fill="url(#hg)"/>
            <circle cx="40" cy="30" r="10" fill="white" fill-opacity="0.25"/>
            <path d="M35 30 L38 33 L46 25" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="logo-title">LoveTrail</h1>
      </div>

      <!-- Name -->
      <section class="section">
        <label class="section-label">Your Name</label>
        <input class="input-field" id="playerName" type="text" placeholder="e.g. Luna" maxlength="16" />
      </section>

      <!-- Avatar -->
      <section class="section">
        <label class="section-label">Your Token</label>
        <div class="avatar-grid" id="avatarGrid">
          <button class="avatar-btn active" data-avatar="rose">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="18" fill="#FFE0EB"/>
              <path d="M20 10 C20 10 14 15 14 20 C14 24 16.5 27 20 27 C23.5 27 26 24 26 20 C26 15 20 10 20 10Z" fill="#FF4D6D"/>
              <path d="M16 19 C16 19 13 17 13 22 C13 25 15.5 27 18 27" fill="#E03060"/>
              <path d="M24 19 C24 19 27 17 27 22 C27 25 24.5 27 22 27" fill="#E03060"/>
              <rect x="19" y="27" width="2" height="5" rx="1" fill="#4CAF50"/>
              <path d="M20 30 C20 30 16 28 15 30" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="avatar-btn" data-avatar="star">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" fill="#FFF3CD"/>
              <path d="M20 8 L22.5 15.5 L30.5 15.5 L24 20.5 L26.5 28 L20 23 L13.5 28 L16 20.5 L9.5 15.5 L17.5 15.5 Z" fill="#FFD166" stroke="#F4A820" stroke-width="1"/>
            </svg>
          </button>
          <button class="avatar-btn" data-avatar="moon">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" fill="#EDE0FF"/>
              <path d="M25 12 C19 12 14 17 14 23 C14 27 16 30.5 19.5 32 C13 31 9 26 9 20 C9 13 14.5 8 21 8 C22.4 8 23.7 8.3 25 8.8 Z" fill="#A084CA"/>
              <circle cx="26" cy="14" r="2" fill="#CDB4DB"/>
              <circle cx="23" cy="10" r="1.2" fill="#CDB4DB"/>
            </svg>
          </button>
          <button class="avatar-btn" data-avatar="butterfly">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" fill="#E8F5E9"/>
              <ellipse cx="15" cy="17" rx="6" ry="8" fill="#81C784" fill-opacity="0.8"/>
              <ellipse cx="25" cy="17" rx="6" ry="8" fill="#66BB6A" fill-opacity="0.8"/>
              <ellipse cx="14" cy="23" rx="5" ry="4" fill="#A5D6A7"/>
              <ellipse cx="26" cy="23" rx="5" ry="4" fill="#A5D6A7"/>
              <rect x="19" y="14" width="2" height="12" rx="1" fill="#5D4037"/>
              <path d="M19 14 L17 11 M21 14 L23 11" stroke="#5D4037" stroke-width="1" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="avatar-btn" data-avatar="gem">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" fill="#E3F2FD"/>
              <path d="M20 10 L30 17 L26 30 L14 30 L10 17 Z" fill="#64B5F6"/>
              <path d="M20 10 L30 17 L20 20 Z" fill="#42A5F5"/>
              <path d="M20 10 L10 17 L20 20 Z" fill="#90CAF9"/>
              <path d="M10 17 L20 20 L14 30 Z" fill="#BBDEFB"/>
              <path d="M30 17 L20 20 L26 30 Z" fill="#1E88E5"/>
            </svg>
          </button>
          <button class="avatar-btn" data-avatar="sun">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" fill="#FFF8E1"/>
              <circle cx="20" cy="20" r="8" fill="#FFB300"/>
              <line x1="20" y1="8" x2="20" y2="5" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
              <line x1="20" y1="32" x2="20" y2="35" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
              <line x1="8" y1="20" x2="5" y2="20" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
              <line x1="32" y1="20" x2="35" y2="20" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
              <line x1="11.5" y1="11.5" x2="9.5" y2="9.5" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
              <line x1="28.5" y1="28.5" x2="30.5" y2="30.5" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
              <line x1="28.5" y1="11.5" x2="30.5" y2="9.5" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
              <line x1="11.5" y1="28.5" x2="9.5" y2="30.5" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="avatar-btn" data-avatar="letter">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" fill="#FCE4EC"/>
              <rect x="9" y="13" width="22" height="16" rx="3" fill="white" stroke="#FF4D6D" stroke-width="1.5"/>
              <path d="M9 16 L20 22 L31 16" stroke="#FF4D6D" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M14 24 L18 24" stroke="#FFAABC" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M14 27 L22 27" stroke="#FFAABC" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="avatar-btn" data-avatar="crown">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" fill="#FFF9C4"/>
              <path d="M10 28 L12 16 L17 22 L20 14 L23 22 L28 16 L30 28 Z" fill="#FFD166" stroke="#F4A820" stroke-width="1" stroke-linejoin="round"/>
              <rect x="10" y="27" width="20" height="3" rx="1.5" fill="#F4A820"/>
              <circle cx="20" cy="14" r="2" fill="#FF4D6D"/>
              <circle cx="12" cy="16" r="1.5" fill="#A084CA"/>
              <circle cx="28" cy="16" r="1.5" fill="#A084CA"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Room Actions -->
      <section class="section room-actions">
        <button class="btn btn-primary" id="createBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          Create Room
        </button>
        <div class="divider"><span>or join with a code</span></div>
        <div class="join-row">
          <input class="input-field join-input" id="joinCode" type="text"
            placeholder="Enter 6-digit code" maxlength="6"
            style="text-transform:uppercase;letter-spacing:4px;font-weight:600" />
          <button class="btn btn-secondary" id="joinBtn">Join</button>
        </div>
      </section>

      <!-- Room Code Banner -->
      <div class="room-code-banner hidden" id="roomBanner">
        <p class="banner-label">Share this code with your partner</p>
        <div class="room-code-display" id="roomCodeDisplay">——</div>
        <p class="banner-hint">Waiting for them to join…</p>
        <div class="waiting-dots"><span></span><span></span><span></span></div>
      </div>

      <p class="error-msg hidden" id="errorMsg"></p>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
